spring.application.name=currency-service
server.port=8100

## CONFIG DB CONNECTION
spring.datasource.url=jdbc:postgresql://localhost:5432/db_currency
spring.datasource.username=postgres
spring.datasource.password=ArR!s50n

#In production
spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.locations=classpath:/db_migration

#Self Registration Pattern
eureka.client.service-url.default-zone=http://localhost:8761/eureka
#Ideal para ambiente containerizados
eureka.instance.prefer-ip-address=true
#Personalizar o id de cada instância
eureka.instance.instance-id=${spring.application.name}:${server.port}
#Indicar que o Service Registry deve validar a saúde do serviço através do actuator, e não somente Heartbeat
# Opcional - Valor Default = TRUE
eureka.client.healthcheck.enabled=true

#Configuração mínima para atuação com o Service Registry de forma consciente
management.endpoints.web.exposure.include=health,info,metrics,circuit-breakers,circuit-breaker-events
#ATENÇÃO: Cuidado a expor esses dados
#Exibir todas as informações de saúde da aplicação
management.endpoint.health.show-details=always
#Exibir informações no endpoint /actuator/info
management.info.env.enabled=true

#Personalização de ifnormações do endpoint /actuator/info
info.app.name=${spring.application.name}
info.app.description=Serviço de câmbio com integração externa ao BCB
info.app.autor=Arthur Risson
#Personalização de Metadatas para o Eureka Service Registry
eureka.instance.metadata-map.github.repo=https://github.com/ArthurRisson/microservice-java
#Definir a ulização das Probes Liveness e Readiness + exibição de de informações de componentes diversos
# Opcional: Padrão já é TRUE
management.endpoint.health.probes.enabled=true
management.health.defaults.enabled=true

spring.cloud.openfeign.client.config.bcb-client.connect-timeout=1000
spring.cloud.openfeign.client.config.bcb-client.read-timeout=3000
spring.cloud.openfeign.circuitbreaker.enabled=true
spring.cloud.openfeign.circuitbreaker.group.enabled=true

resilience4j.retry.instances.bcb-client.max-attempts=3
resilience4j.retry.instances.bcb-client.wait-duration=500ms
resilience4j.retry.instances.bcb-client.enable-exponential-backoff=true
resilience4j.retry.instances.bcb-client.exponential-backoff-multiplier=2.0
resilience4j.retry.instances.bcb-client.enable-randomized-wait=true
resilience4j.retry.instances.bcb-client.randomized-wait-factor=0.5

spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=15s

resilience4j.circuitbreaker.instances.bcb-client.register-health-indicator=true
resilience4j.circuitbreaker.instances.bcb-client.slidingWindowSize=10
resilience4j.circuitbreaker.instances.bcb-client.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.bcb-client.failureRateThreshold=50
resilience4j.circuitbreaker.instances.bcb-client.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.bcb-client.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.bcb-client.automaticTransitionFromOpenToHalfOpenEnabled=true